<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#10C49A"/>
  <!-- Thatched roof hut -->
  <!-- Roof triangle -->
  <polygon points="16,5 26,14 6,14" fill="#E8A020"/>
  <!-- Roof texture lines -->
  <line x1="10" y1="11" x2="16" y2="5" stroke="#5C2D0A" stroke-width="0.6" opacity="0.4"/>
  <line x1="13" y1="12.5" x2="16" y2="5" stroke="#5C2D0A" stroke-width="0.6" opacity="0.4"/>
  <line x1="19" y1="12.5" x2="16" y2="5" stroke="#5C2D0A" stroke-width="0.6" opacity="0.4"/>
  <line x1="22" y1="11" x2="16" y2="5" stroke="#5C2D0A" stroke-width="0.6" opacity="0.4"/>
  <!-- Hut body -->
  <rect x="10" y="14" width="12" height="9" rx="1" fill="#5C2D0A"/>
  <!-- Door -->
  <rect x="13.5" y="18" width="4" height="5" rx="1" fill="#E8A020"/>
  <!-- Window -->
  <rect x="11" y="15.5" width="3" height="3" rx="0.5" fill="#E8A020" opacity="0.7"/>
  <!-- Palm tree left -->
  <line x1="7" y1="23" x2="9" y2="14" stroke="#5C2D0A" stroke-width="1.2"/>
  <ellipse cx="7.5" cy="13.5" rx="3" ry="1.5" fill="#0AA37F" transform="rotate(-20 7.5 13.5)"/>
  <ellipse cx="9.5" cy="12.5" rx="3" ry="1.5" fill="#0AA37F" transform="rotate(15 9.5 12.5)"/>
  <!-- Palm tree right -->
  <line x1="25" y1="23" x2="23" y2="14" stroke="#5C2D0A" stroke-width="1.2"/>
  <ellipse cx="24.5" cy="13.5" rx="3" ry="1.5" fill="#0AA37F" transform="rotate(20 24.5 13.5)"/>
  <ellipse cx="22.5" cy="12.5" rx="3" ry="1.5" fill="#0AA37F" transform="rotate(-15 22.5 12.5)"/>
  <!-- Ground line -->
  <line x1="5" y1="23" x2="27" y2="23" stroke="#E8A020" stroke-width="1" opacity="0.5"/>
  <!-- "SS" text -->
  <text x="16" y="29" font-family="Arial Black, sans-serif" font-size="4.5" font-weight="900" fill="white" text-anchor="middle" letter-spacing="0.5">SS</text>
</svg>
